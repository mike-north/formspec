name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify API report is up to date
        # Each package's build script ends with `api-extractor:local`, which
        # silently regenerates api-report/*.api.md to match the current
        # public API instead of failing on drift. That means a plain
        # `pnpm run api-extractor` (validate mode) run after this build step
        # would always pass trivially — the build step already rewrote the
        # on-disk report to match. The actual signal is whether that rewrite
        # produced changes the author didn't commit, so fail the build if it
        # did: a widened, renamed, or removed public export gets caught here
        # even when the PR never touched api-report itself. Scoped to
        # *.api.md so unrelated files under api-report/ (e.g. .gitkeep) can't
        # trigger a false failure.
        run: git diff --exit-code -- 'packages/*/api-report/*.api.md'

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Type check
        run: pnpm run typecheck

  typescript-matrix:
    name: Compute TypeScript matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.compute.outputs.include }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute matrix
        id: compute
        # TypeScript 7.x is the Go rewrite with a substantively different API
        # surface — we'll handle that as a separate, deliberate migration
        # rather than silently testing it via dist-tag drift. Every
        # dist-tag-driven entry below is therefore clamped to <7: dist-tags
        # are resolved to concrete versions at run time and dropped if
        # they've crossed into 7.x.
        #
        # NAMING CONTRACT: the pinned-major row is always present and always
        # labeled "<defaultMajor>.x" (e.g. "6.x"), which renders as the
        # required job "Test (TypeScript <defaultMajor>.x)". Branch
        # protection pins its required status check to that exact name.
        # defaultMajor is read from package.json — never hardcode it — so a
        # deliberate pinned-major bump renames this row automatically; when
        # that happens, update the repo ruleset's required context to match
        # in the same change. This row's version is resolved independently
        # of any dist-tag (`npm view typescript@^<major> version`), so it
        # stays correct even if `latest`/`beta` point elsewhere or skip the
        # pinned major entirely. If no stable release of the pinned major
        # exists on npm, this step throws and the job fails loudly rather
        # than silently dropping the required row.
        #
        # Keep matrix labels stable otherwise, too. README badges target
        # these check-run names, while the install override and
        # `tsc --version` step expose the concrete resolved compiler version
        # for each row.
        #
        # `experimental` (which drives `continue-on-error`) is derived from
        # whether the resolved major matches the workspace's declared
        # TypeScript major (the root devDependency), except the pinned-major
        # row itself, which is always non-experimental by definition.
        # Mismatches elsewhere are informational — they surface
        # incompatibilities without blocking merges.
        #
        # The "5.x" entry is skipped when the workspace's default TypeScript
        # is already on 5.x — the main build-and-test job covers it. When
        # the default moves on, the 5.x entry auto-enables to keep
        # backwards-compatibility coverage.
        #
        # The dist-tag "latest" row is only kept when it resolves below 7
        # AND its major differs from the pinned major — once `latest`
        # returns to the pinned major, that row would just duplicate the
        # pinned-major row's coverage.
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_OUTPUT"
          import { readFileSync } from "node:fs";
          import { execSync } from "node:child_process";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const spec = pkg.devDependencies?.typescript ?? "";
          const defaultMajor = Number((spec.match(/\d+/) ?? ["0"])[0]);
          const distTags = JSON.parse(
            execSync("npm view typescript dist-tags --json", { encoding: "utf8" })
          );
          const majorOf = (v) => Number(v.split(".")[0]);
          const resolveBelow7 = (tag) => {
            const v = distTags[tag];
            return v && majorOf(v) < 7 ? v : null;
          };
          const isExperimental = (major) => major !== defaultMajor;
          // Resolve the latest stable (non-prerelease) release of a given
          // major directly from the registry, independent of any dist-tag.
          const resolveLatestStableMajor = (major) => {
            let raw;
            try {
              raw = execSync(`npm view typescript@'^${major}' version --json`, {
                encoding: "utf8",
              });
            } catch {
              return null;
            }
            const parsed = JSON.parse(raw);
            const versions = Array.isArray(parsed) ? parsed : [parsed];
            if (versions.length === 0) return null;
            return versions
              .sort((a, b) => {
                const pa = a.split(".").map(Number);
                const pb = b.split(".").map(Number);
                for (let i = 0; i < 3; i++) {
                  if (pa[i] !== pb[i]) return pa[i] - pb[i];
                }
                return 0;
              })
              .at(-1);
          };
          const include = [];
          const pinnedVersion = resolveLatestStableMajor(defaultMajor);
          if (!pinnedVersion) {
            throw new Error(
              `No stable typescript ${defaultMajor}.x release found on npm; cannot compute the required pinned-major CI row.`
            );
          }
          include.push({
            label: `${defaultMajor}.x`,
            typescript: pinnedVersion,
            experimental: false,
          });
          if (defaultMajor !== 5) {
            include.push({ label: "5.x", typescript: "5", experimental: isExperimental(5) });
          }
          const latest = resolveBelow7("latest");
          if (latest && majorOf(latest) !== defaultMajor) {
            include.push({
              label: "latest",
              typescript: latest,
              experimental: isExperimental(majorOf(latest)),
            });
          }
          const beta = resolveBelow7("beta");
          if (beta) {
            // Pre-release is always experimental.
            include.push({ label: "beta", typescript: beta, experimental: true });
          }
          console.log(`include=${JSON.stringify(include)}`);
          EOF

  typescript-versions:
    name: Test (TypeScript ${{ matrix.label }})
    needs: typescript-matrix
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.typescript-matrix.outputs.include) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Pin TypeScript version via pnpm override
        run: npm pkg set "pnpm.overrides.typescript=${{ matrix.typescript }}"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Print resolved TypeScript version
        run: pnpm exec tsc --version

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Type check
        run: pnpm run typecheck

  typescript-7-tsgo:
    name: Test (TypeScript 7.0 native preview)
    runs-on: ubuntu-latest
    continue-on-error: true # experimental: TS 7 is the Go rewrite with a separate API surface
    # Native-preview vs. stable typescript@7 (evaluated for #576, also see #449):
    # As of 2026-07-14, `typescript@latest` (7.0.2) IS the native Go rewrite —
    # its own "typescript" dependency graph pulls in platform-specific native
    # binaries and its "tsc" bin is the Go compiler. @typescript/native-preview
    # is a separate, pre-release-only channel that publishes just two dist-tags
    # (`beta` and `latest`), both `7.0.0-dev.*` nightly builds; `latest` is the
    # newest and auto-advances as new nightlies publish. We install
    # @typescript/native-preview@latest here — tracking the freshest
    # native-preview nightly rather than a pinned beta snapshot — instead of
    # switching to stable typescript@7 because the workspace's global
    # `pnpm.overrides.typescript` alias (needed so packages that use the JS
    # compiler API keep working under the TS6-compatible shim) would collide
    # with a plain "typescript@^7" devDependency; picking that up would need
    # a second alias plus rerouting the tsgo binary path around the existing
    # "tsc" launcher this job already writes for the TS6 shim. That's real
    # complexity for a lane that FormSpec deliberately treats as
    # native-preview-only, non-blocking coverage (see CLAUDE.md "Supported
    # TypeScript versions"), not an officially supported TS 7 target. Revisit
    # if/when FormSpec does a deliberate TS 7 migration.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Pin TypeScript via the typescript6 alias and native-preview
        # Keep tools that import from "typescript" on the TS 6 JS API shim,
        # while the native-preview package supplies the tsgo compiler binary.
        # This follows Microsoft's TS 7 beta side-by-side guidance.
        #
        # We do not pin a nested override for the shim's own real-TypeScript
        # dependency: @typescript/typescript6 has already renamed that
        # internal dependency once (from "typescript" to "@typescript/old"
        # as of 6.0.1, see #576), which silently turned a prior nested
        # override here into dead config. Its own "^6" range is sufficient,
        # and scripts/tsgo-ci.mts now discovers the current dependency name
        # dynamically from the shim's manifest rather than assuming it.
        run: |
          npm pkg set "pnpm.overrides.typescript=npm:@typescript/typescript6@^6.0.0"
          npm pkg set "devDependencies.@typescript/native-preview=latest"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Expose TypeScript 6 compatibility bins and server subpaths
        # @typescript/typescript6 deliberately names its compiler tsc6 so it
        # can coexist with a future TS 7 tsc. Existing package scripts invoke
        # tsc directly, and @formspec/ts-plugin imports tsserverlibrary.
        # These local CI-only bridges keep that TS 6 surface available while
        # package imports from "typescript" resolve through the JS API shim.
        run: pnpm exec tsx scripts/tsgo-ci.mts prepare-compat

      - name: Assert TypeScript API alias resolution
        run: pnpm exec tsx scripts/tsgo-ci.mts assert-alias

      - name: Print resolved versions
        run: |
          pnpm exec tsc --version
          pnpm exec tsgo --version

      - name: Build
        run: pnpm run build

      - name: Typecheck with tsgo
        # Temporarily scope the root config to the package typecheck surface,
        # then run the dedicated e2e tsgo project config. The Vitest 4 test
        # dependency removes the @types/chai "containSubset" duplicate tracked
        # in #469, so both direct checks run without skipLibCheck.
        run: pnpm exec tsx scripts/tsgo-ci.mts typecheck

      - name: Run tests
        # Tests still execute through tsc/tsup-backed tooling. Running them here
        # validates that the TS 6 API alias remains compatible end-to-end.
        run: pnpm run test

  knip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run knip
        run: pnpm run knip
