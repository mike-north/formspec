name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Type check
        run: pnpm run typecheck

  typescript-matrix:
    name: Compute TypeScript matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.compute.outputs.include }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute matrix
        id: compute
        # TypeScript 7.x is the Go rewrite with a substantively different API
        # surface — we'll handle that as a separate, deliberate migration
        # rather than silently testing it via dist-tag drift. Every matrix
        # entry below is therefore clamped to <7: dist-tags are resolved to
        # concrete versions at run time and dropped if they've crossed into
        # 7.x; the nightly entry uses an explicit <7 semver range.
        #
        # `experimental` (which drives `continue-on-error`) is derived from
        # whether the resolved major matches the workspace's declared
        # TypeScript major (the root devDependency). Mismatches are
        # informational — they surface incompatibilities without blocking
        # merges. Once the workspace bumps its default to 6.x, 6.x rows
        # stop being experimental automatically.
        #
        # The "5.x" entry is skipped when the workspace's default TypeScript
        # is already on 5.x — the main build-and-test job covers it. When
        # the default moves on, the 5.x entry auto-enables to keep
        # backwards-compatibility coverage.
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_OUTPUT"
          import { readFileSync } from "node:fs";
          import { execSync } from "node:child_process";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const spec = pkg.devDependencies?.typescript ?? "";
          const defaultMajor = Number((spec.match(/\d+/) ?? ["0"])[0]);
          const distTags = JSON.parse(
            execSync("npm view typescript dist-tags --json", { encoding: "utf8" })
          );
          const majorOf = (v) => Number(v.split(".")[0]);
          const resolveBelow7 = (tag) => {
            const v = distTags[tag];
            return v && majorOf(v) < 7 ? v : null;
          };
          const isExperimental = (major) => major !== defaultMajor;
          const include = [];
          if (defaultMajor !== 5) {
            include.push({ label: "5.x", typescript: "5", experimental: isExperimental(5) });
          }
          const latest = resolveBelow7("latest");
          if (latest) {
            include.push({
              label: `latest (${latest})`,
              typescript: latest,
              experimental: isExperimental(majorOf(latest)),
            });
          }
          const beta = resolveBelow7("beta");
          if (beta) {
            // Pre-release is always experimental.
            include.push({ label: `beta (${beta})`, typescript: beta, experimental: true });
          }
          // Nightly is always experimental.
          include.push({
            label: "6.x nightly",
            typescript: ">=6.0.0-dev <7.0.0-0",
            experimental: true,
          });
          console.log(`include=${JSON.stringify(include)}`);
          EOF

  typescript-versions:
    name: Test (TypeScript ${{ matrix.label }})
    needs: typescript-matrix
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.typescript-matrix.outputs.include) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Pin TypeScript version via pnpm override
        run: npm pkg set "pnpm.overrides.typescript=${{ matrix.typescript }}"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Print resolved TypeScript version
        run: pnpm exec tsc --version

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Type check
        run: pnpm run typecheck

  typescript-7-tsgo:
    name: Test (TypeScript 7.0 native preview)
    runs-on: ubuntu-latest
    continue-on-error: true # experimental: TS 7 is the Go rewrite with a separate API surface

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Pin TypeScript via the typescript6 alias and native-preview
        # Keep tools that import from "typescript" on the TS 6 JS API shim,
        # while the native-preview package supplies the tsgo compiler binary.
        # This follows Microsoft's TS 7 beta side-by-side guidance.
        run: |
          npm pkg set "pnpm.overrides.typescript=npm:@typescript/typescript6@^6.0.0"
          npm pkg set "pnpm.overrides.@typescript/typescript6>typescript=^6.0.0"
          npm pkg set "devDependencies.@typescript/native-preview=beta"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Expose TypeScript 6 compatibility bins and server subpaths
        # @typescript/typescript6 deliberately names its compiler tsc6 so it
        # can coexist with a future TS 7 tsc. Existing package scripts invoke
        # tsc directly, and @formspec/ts-plugin imports tsserverlibrary.
        # These local CI-only bridges keep that TS 6 surface available while
        # package imports from "typescript" resolve through the JS API shim.
        run: pnpm exec tsx scripts/tsgo-ci.mts prepare-compat

      - name: Assert TypeScript API alias resolution
        run: pnpm exec tsx scripts/tsgo-ci.mts assert-alias

      - name: Print resolved versions
        run: |
          pnpm exec tsc --version
          pnpm exec tsgo --version

      - name: Build
        run: pnpm run build

      - name: Typecheck with tsgo
        # FIXME(#469): scoped skipLibCheck workaround for the @types/chai
        # "containSubset" duplicate-identifier error under tsgo.
        # Temporarily scope the root config to the package typecheck surface
        # for this direct tsgo invocation. e2e tsgo coverage remains tracked
        # in #471, and type-level negative tests continue to run through tsd.
        run: pnpm exec tsx scripts/tsgo-ci.mts typecheck

      - name: Run tests
        # Tests still execute through tsc/tsup-backed tooling. Running them here
        # validates that the TS 6 API alias remains compatible end-to-end.
        run: pnpm run test

  knip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run knip
        run: pnpm run knip
